# GoPrint example configuration (safe to commit)
# Copy this file to config.yaml and adjust values for your environment.

server:
  # Bind address for HTTP server
  host: 0.0.0.0
  # API listen port
  port: 5001

auth:
  # Enable authentication for all API endpoints except /health.
  enabled: false
  feishu:
    # Feishu app credentials from Open Platform.
    app_id: cli_xxx
    app_secret: your_app_secret
    # Optional callback URL for browser-based OAuth redirects.
    redirect_uri: http://localhost:5001/auth/feishu/callback
    # OAuth authorize endpoint.
    authorize_url: https://accounts.feishu.cn/open-apis/authen/v1/authorize
    # OAuth token endpoint for exchanging code to user_access_token.
    token_url: https://open.feishu.cn/open-apis/authen/v2/oauth/token
    # Feishu API used to validate user_access_token.
    user_info_url: https://open.feishu.cn/open-apis/authen/v1/user_info
    # Timeout for calling Feishu user info API.
    request_timeout: 3s
    # In-memory cache TTL for validated bearer tokens.
    token_cache_ttl: 2m

sane_api:
  # Whether /sane-api requires authentication. Set false for trusted internal networks.
  auth_enabled: true
  # scanservjs upstream used by /sane-api.
  target_url: http://192.168.101.37:8080
  # Header checked by /sane-api auth middleware when auth_token is set.
  auth_header: X-Sane-Api-Key
  # Shared secret for /sane-api. Ignored when auth_enabled=false.
  # Leave empty only if auth_enabled=true and you rely on global auth.enabled=true.
  auth_token: change_me

job_store:
  # Enable Bitable-backed print job storage and user-scoped query for /api/jobs.
  enabled: false
  feishu:
    # Bitable app token, found in Base URL.
    app_token: appxxxxxxxxxxxxxxxx
    # Bitable table id, found in table URL.
    table_id: tblxxxxxxxxxxxxxxxx
    # Timeout for Bitable OpenAPI calls.
    request_timeout: 3s

printing:
  # Username used in IPP requests (requesting-user-name)
  ipp_username: goprint
  # Manual duplex hook expiration; Go duration format (e.g. 10m, 30m, 1h)
  manual_duplex_hook_ttl: 30m

office_conversion:
  # Enable Python gRPC office converter for doc/docx/ppt/pptx.
  enabled: false
  # If true, GoPrint will start office converter process with server startup.
  start_with_server: false
  # Startup script path for office converter process.
  service_script: office_converter/run.sh
  # Accepted source formats for conversion. Do not include pdf here.
  accepted_formats: [doc, docx, ppt, pptx]
  # Python gRPC server address.
  grpc_address: 127.0.0.1:50061
  # Timeout for each conversion RPC call.
  request_timeout: 60s
  # Shared converted-file path. Go reads converted PDF from here.
  output_dir: /tmp/office-output

printers:
  # Example 1: visible in frontend printer list
  - id: default-printer
    uri: ipp://localhost:631/printers/default-printer
    visible: true
    reverse: false
    duplex_mode: off
    first_pass: even
    pad_to_even: true
    reverse_first_pass: false
    reverse_second_pass: false
    rotate_second_pass: false
    note: ""

  # Example 2: native duplex supported by printer
  - id: native-duplex-printer
    uri: ipp://localhost:631/printers/native-duplex-printer
    visible: true
    reverse: false
    duplex_mode: auto
    first_pass: even
    pad_to_even: true
    reverse_first_pass: false
    reverse_second_pass: false
    rotate_second_pass: false
    note: "native duplex supported"

  # Example 3: configured but hidden from frontend list
  - id: internal-backup-printer
    uri: ipp://127.0.0.1:631/printers/internal-backup-printer
    visible: false
    reverse: true
    duplex_mode: manual
    first_pass: odd
    pad_to_even: true
    reverse_first_pass: true
    reverse_second_pass: true
    rotate_second_pass: true
    note: "manual duplex profile for this model"

# 飞书 Bot 配置
bot:
  # 启用飞书 Bot 事件订阅。需在飞书开放平台配置事件订阅 URL。
  enabled: false
  # 飞书开放平台事件订阅的 Verification Token
  verification_token: ""
  # 飞书应用的 Encrypt Key（若在开放平台开启了加密）
  encrypt_key: ""
  # 机器人名称，群聊中 @ 此名称触发
  bot_name: "GoPrint"
  # 卡片交互超时时间（Go duration 格式）
  card_timeout: 10m
  # Bot 临时文件存放目录
  work_dir: /tmp/bot-files

# 按文件扩展名的默认打印参数（不带点）
file_type_defaults:
  pdf:
    copies: 1
    duplex: auto
    nup: 1
    collate: true
    direction: horizontal
  doc:
    copies: 1
    duplex: "off"
    nup: 2
    collate: true
  docx:
    $ref: doc
  ppt:
    copies: 1
    duplex: "off"
    nup: 4
    collate: true
  pptx:
    $ref: ppt
  jpg:
    copies: 1
    duplex: "off"
    nup: 1
    collate: true
  jpeg:
    $ref: jpg
  png:
    $ref: jpg
