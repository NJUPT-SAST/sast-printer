openapi: 3.0.0
info:
  title: GoPrint 打印服务 API
  description: |
    GoPrint 是一个基于 Go 和 Gin 框架的打印服务 API，提供 CUPS 集成的打印功能。
    支持自动双面打印、手动双面打印、份数排列等功能。
  version: 1.0.0
  contact:
    name: GoPrint 团队
servers:
  - url: http://localhost:5001
    description: 本地开发环境
  - url: http://{host}:{port}
    description: 自定义服务器
    variables:
      host:
        default: localhost
        description: 服务器地址
      port:
        default: '5001'
        description: 服务器端口

tags:
  - name: 系统
    description: 系统级接口
  - name: 飞书鉴权
    description: 飞书 OAuth2 免登录流程接口
  - name: scanservjs 代理
    description: 代理到 scanservjs 后端的透传接口
  - name: 打印机管理
    description: 打印机查询和信息接口
  - name: 打印任务
    description: 打印任务相关操作
  - name: 手动双面打印
    description: 手动双面打印工作流
  - name: 飞书文档
    description: 飞书文档/知识库导出并打印

security:
  - FeishuBearerAuth: []

paths:
  /health:
    get:
      security: []
      tags:
        - 系统
      summary: 健康检查
      description: 检查服务是否运行正常
      operationId: healthCheck
      responses:
        '200':
          description: 服务正常运行
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  message:
                    type: string
                    example: "GoPrint is running."

  /sane-api:
    get:
      tags:
        - scanservjs 代理
      summary: 代理 scanservjs 根路径（GET）
      description: |
        将 `GET /sane-api` 转发到 `GET {sane_api.target_url}/`。

        实际代码对 `/sane-api/*` 支持所有常见 HTTP 方法（GET/POST/PUT/PATCH/DELETE/OPTIONS/HEAD）。
        OpenAPI 仅以 GET/POST 两种形式展示代理模型。
      operationId: proxySaneAPIRootGet
      security:
        - SaneApiKeyAuth: []
        - FeishuBearerAuth: []
        - {}
      responses:
        '200':
          description: 上游成功响应（状态码和内容由 scanservjs 决定）
          content:
            '*/*':
              schema:
                type: string
        '401':
          description: 未授权（当 sane_api.auth_enabled=true 且鉴权失败）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: 上游不可达或代理错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - scanservjs 代理
      summary: 代理 scanservjs 根路径（POST）
      description: 将 `POST /sane-api` 转发到 `POST {sane_api.target_url}/`。
      operationId: proxySaneAPIRootPost
      security:
        - SaneApiKeyAuth: []
        - FeishuBearerAuth: []
        - {}
      requestBody:
        required: false
        content:
          '*/*':
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: 上游成功响应（状态码和内容由 scanservjs 决定）
          content:
            '*/*':
              schema:
                type: string
        '401':
          description: 未授权（当 sane_api.auth_enabled=true 且鉴权失败）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: 上游不可达或代理错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sane-api/{path}:
    parameters:
      - name: path
        in: path
        required: true
        description: |
          上游路径。
          例如访问 `/sane-api/api-docs` 时，此值为 `api-docs`。

          说明：OpenAPI 路径模板无法完整表达 Gin `/*path` 多级通配，
          实际服务支持任意深度路径（如 `/sane-api/api/v1/context`）。
        schema:
          type: string
          example: api-docs
    get:
      tags:
        - scanservjs 代理
      summary: 代理 scanservjs 子路径（GET）
      description: |
        将 `GET /sane-api/{path}` 转发到 `GET {sane_api.target_url}/{path}`。
        上游返回的 `Location` 头会自动重写为 `/sane-api/...`，避免重定向丢前缀。
      operationId: proxySaneAPIPathGet
      security:
        - SaneApiKeyAuth: []
        - FeishuBearerAuth: []
        - {}
      responses:
        '200':
          description: 上游成功响应（状态码和内容由 scanservjs 决定）
          content:
            '*/*':
              schema:
                type: string
        '301':
          description: 上游重定向（Location 已重写为 /sane-api 前缀）
        '302':
          description: 上游重定向（Location 已重写为 /sane-api 前缀）
        '304':
          description: 资源未修改（缓存协商，来自上游）
        '401':
          description: 未授权（当 sane_api.auth_enabled=true 且鉴权失败）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: 上游不可达或代理错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - scanservjs 代理
      summary: 代理 scanservjs 子路径（POST）
      description: 将 `POST /sane-api/{path}` 转发到 `POST {sane_api.target_url}/{path}`。
      operationId: proxySaneAPIPathPost
      security:
        - SaneApiKeyAuth: []
        - FeishuBearerAuth: []
        - {}
      requestBody:
        required: false
        content:
          '*/*':
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: 上游成功响应（状态码和内容由 scanservjs 决定）
          content:
            '*/*':
              schema:
                type: string
        '401':
          description: 未授权（当 sane_api.auth_enabled=true 且鉴权失败）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: 上游不可达或代理错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/config:
    get:
      security: []
      tags:
        - 飞书鉴权
      summary: 获取前端鉴权配置
      description: 返回前端初始化飞书免登所需的配置项。
      operationId: getAuthConfig
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  app_id:
                    type: string
                    example: "cli_xxx"
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/config/authorize-url:
    get:
      security: []
      tags:
        - 飞书鉴权
      summary: 生成飞书授权地址
      description: |
        生成飞书 OAuth2 授权链接，适用于端外或回退到 authorize 页面的流程。
        前端端内可优先使用 requestAccess/requestAuthCode 获取 code，再调用 code-login 接口。
      operationId: buildFeishuAuthorizeURL
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: CSRF 防护状态值，不传则服务端自动生成
        - name: redirect_uri
          in: query
          required: false
          schema:
            type: string
          description: 回调地址，不传则使用配置文件中的 auth.feishu.redirect_uri
        - name: scope
          in: query
          required: false
          schema:
            type: string
          description: 授权 scope，多个以空格分隔
        - name: code_challenge
          in: query
          required: false
          schema:
            type: string
          description: PKCE challenge
        - name: code_challenge_method
          in: query
          required: false
          schema:
            type: string
            enum: [S256, plain]
          description: PKCE challenge 计算方式
        - name: prompt
          in: query
          required: false
          schema:
            type: string
          description: 授权交互方式（如 consent）
      responses:
        '200':
          description: 成功生成授权地址
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorize_url:
                    type: string
                    example: "https://accounts.feishu.cn/open-apis/authen/v1/authorize?..."
                  state:
                    type: string
                    example: "4f0f8d2f7d7a1b8f..."
        '400':
          description: 参数错误或配置缺失
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/config/code-login:
    post:
      security: []
      tags:
        - 飞书鉴权
      summary: 使用授权码换取 user_access_token 并获取用户信息
      description: |
        对应飞书免登流程中的后端步骤：
        1. 前端通过 requestAccess/requestAuthCode 获取 code
        2. 后端调用飞书 token 接口换取 user_access_token
        3. 后端调用 user_info 接口获取当前用户身份
      operationId: exchangeFeishuCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: 飞书返回的授权码（5 分钟有效且一次性）
                redirect_uri:
                  type: string
                  description: 与授权时保持一致的 redirect_uri，可选
                code_verifier:
                  type: string
                  description: 若启用 PKCE，此字段必填
      responses:
        '200':
          description: 登录成功并返回 token 和用户信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  token_type:
                    type: string
                    example: "Bearer"
                  access_token:
                    type: string
                  expires_in:
                    type: integer
                    example: 7200
                  expires_at:
                    type: string
                    format: date-time
                    example: "2026-03-30T15:30:00Z"
                  refresh_token:
                    type: string
                  refresh_token_expires_in:
                    type: integer
                    example: 604800
                  refresh_token_expires_at:
                    type: string
                    format: date-time
                  scope:
                    type: string
                    example: "auth:user.id:read"
                  issued_at:
                    type: string
                    format: date-time
                  user:
                    $ref: '#/components/schemas/FeishuUserInfo'
        '400':
          description: 参数错误或配置缺失
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 授权码无效或鉴权失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: 调用飞书服务失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/printers:
    get:
      tags:
        - 打印机管理
      summary: 列出所有可用打印机
      description: 获取系统中所有配置的打印机列表及其详细信息
      operationId: listPrinters
      responses:
        '200':
          description: 成功获取打印机列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  printers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Printer'
                  count:
                    type: integer
                    example: 2
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: CUPS 服务不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权（缺少或无效的飞书 user_access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/printers/{id}:
    get:
      tags:
        - 打印机管理
      summary: 获取打印机详细信息
      description: 获取指定打印机的详细配置和状态信息
      operationId: getPrinterInfo
      parameters:
        - name: id
          in: path
          required: true
          description: 打印机ID
          schema:
            type: string
            example: "color-printer"
      responses:
        '200':
          description: 成功获取打印机信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Printer'
        '404':
          description: 打印机不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器错误或 CUPS 服务不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权（缺少或无效的飞书 user_access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/jobs:
    post:
      tags:
        - 打印任务
      summary: 提交打印任务
      description: |
        上传 PDF 文件并提交打印任务。
        
        支持的功能：
        - 自动双面打印（duplex_mode=auto）
        - 手动双面打印（duplex_mode=manual）
        - 单面打印（duplex_mode=off）
        - 份数控制（copies 参数）
        - 排列方式（collate 参数）
      operationId: submitPrintJob
      parameters:
        - name: copies
          in: query
          required: false
          description: 打印份数，默认为 1（1-255）
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 255
          example: 2
        - name: duplex
          in: query
          required: false
          description: 是否启用双面打印（覆盖打印机配置）
          schema:
            type: string
            enum: [true, false, yes, no, '1', '0', on, off]
          example: "true"
        - name: collate
          in: query
          required: false
          description: 份数排列方式。true=1,2,3,1,2,3（排列）；false=1,1,2,2,3,3（不排列）
          schema:
            type: string
            enum: [true, false, yes, no, '1', '0', on, off]
            default: "true"
          example: "true"
        - name: pages
          in: query
          required: false
          description: |
            要打印的页码范围（仅对 PDF 和已转换的文件有效）。支持格式：
            - "1,2,3" 打印第 1、2、3 页
            - "1-3" 打印第 1 到 3 页
            - "1-3,5,7-9" 打印第 1-3 页、第 5 页、第 7-9 页
            页码从 1 开始计数。不指定时打印全部页码。
          schema:
            type: string
          example: "1-5,10"
        - name: nup
          in: query
          required: false
          description: |
            每版打印页数（N-up 布局）。支持值：
            - 1：正常打印（默认，每页一份）
            - 2：每版打印 2 页。根据文档方向自动调整输出方向：
              - 纵向文档 → 横向输出排布
              - 横向文档 → 纵向输出排布
            - 4：每版打印 4 页。保持文档原始方向不变
          schema:
            type: integer
            enum: [1, 2, 4]
            default: 1
          example: 2
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - printer_id
                - file
              properties:
                printer_id:
                  type: string
                  description: 打印机ID
                  example: "color-printer"
                file:
                  type: string
                  format: binary
                  description: 要打印的文件（支持 pdf/doc/docx/ppt/pptx，Office 文件会自动转换为 PDF）
      responses:
        '201':
          description: 打印任务提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitPrintJobResponse'
        '400':
          description: 请求参数错误或验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 打印机不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: CUPS 服务不可用或 Office 转换服务不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权（缺少或无效的飞书 user_access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - 打印任务
      summary: 列出所有打印任务
      description: 获取所有打印机的打印任务列表，或指定打印机的任务列表
      operationId: listPrintJobs
      parameters:
        - name: printer_id
          in: query
          required: false
          description: 打印机ID，为空则返回所有打印机的任务
          schema:
            type: string
          example: "color-printer"
      responses:
        '200':
          description: 成功获取打印任务列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/BitablePrintJob'
                  count:
                    type: integer
                    example: 3
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权（缺少或无效的飞书 user_access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/jobs/preview:
    post:
      tags:
        - 打印任务
      summary: 转换文档并返回预览 PDF
      description: |
        上传文件后仅执行转换并返回 PDF 流用于前端预览，不提交打印任务。
        支持 PDF 直出预览及 Office 文件转换后预览。
      operationId: previewConvertedDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: 要预览的文件（支持 pdf/doc/docx/ppt/pptx）
      responses:
        '200':
          description: 预览转换成功，返回 PDF 二进制流
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          description: 请求参数错误或文件类型不支持
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 转换服务不可用或队列繁忙
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权（缺少或无效的飞书 user_access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/jobs/supported-file-types:
    get:
      tags:
        - 打印任务
      summary: 获取支持的文件类型
      description: |
        返回当前系统支持上传的文件扩展名列表（不带点）。
        始终包含 `pdf`，其余类型来自 `office_conversion.accepted_formats` 配置。
      operationId: getSupportedFileTypes
      responses:
        '200':
          description: 成功获取支持的文件类型
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportedFileTypesResponse'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权（缺少或无效的飞书 user_access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/jobs/preview/feishu:
    post:
      tags:
        - 飞书文档
      summary: 导出飞书文档并返回预览 PDF
      description: |
        输入一个飞书文档或知识库页面的 URL，系统自动导出为 PDF 并返回预览。

        支持的 URL 格式：
        - 文档：`https://xxx.feishu.cn/docx/TOKEN`
        - 知识库页面：`https://xxx.feishu.cn/wiki/TOKEN`

        知识库文档会先通过 wiki API 解析节点，获取底层 obj_token 后再导出。
        内含快捷方式的节点会自动跟踪到目标实体。
      operationId: previewFeishuDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeishuExportRequest'
      responses:
        '200':
          description: 导出并预览成功，返回 PDF 二进制流
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          description: 请求参数错误或 URL 格式不支持
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 导出服务不可用或队列繁忙
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权（缺少或无效的飞书 user_access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/jobs/feishu:
    post:
      tags:
        - 飞书文档
      summary: 导出飞书文档并提交打印
      description: |
        输入一个飞书文档或知识库页面的 URL，系统自动导出为 PDF 并提交到指定打印机。

        支持的 URL 格式：
        - 文档：`https://xxx.feishu.cn/docx/TOKEN`
        - 知识库页面：`https://xxx.feishu.cn/wiki/TOKEN`

        导出完成后会经过与文件上传打印一致的后处理流程（页码范围、N-up 布局、份数、双面等），再提交到 CUPS。

        前提条件：
        - 飞书自建应用需拥有文档导出权限（`docs:doc:readonly`、`docx:document:readonly`、`drive:drive:readonly`）
        - 导出知识库文档时应用须被添加为知识库管理员
        - 应用需对目标文档有读权限
      operationId: submitFeishuPrintJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeishuPrintJobRequest'
      responses:
        '201':
          description: 导出成功并提交打印
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitPrintJobResponse'
        '400':
          description: 请求参数错误或验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 打印机不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 导出服务不可用、队列繁忙或 CUPS 不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权（缺少或无效的飞书 user_access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/jobs/{id}:
    get:
      tags:
        - 打印任务
      summary: 获取打印任务状态
      description: 获取指定打印任务的详细状态和信息
      operationId: getJobStatus
      parameters:
        - name: id
          in: path
          required: true
          description: 打印任务ID
          schema:
            type: string
          example: "123"
      responses:
        '200':
          description: 成功获取任务状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CupsPrintJob'
        '400':
          description: 任务ID 格式无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 任务不存在或 CUPS 服务不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权（缺少或无效的飞书 user_access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - 打印任务
      summary: 删除任务记录
      description: |
        仅删除飞书多维表中的任务记录，不会向打印机发送取消指令。
        如需停止实际打印，请在打印机面板上手动取消任务。
      operationId: cancelPrintJob
      parameters:
        - name: id
          in: path
          required: true
          description: 打印任务ID
          schema:
            type: string
          example: "123"
      responses:
        '200':
          description: 任务记录删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    description: 打印任务ID
                    example: "123"
                  status:
                    type: string
                    description: 删除结果状态
                    example: "deleted"
                  message:
                    type: string
                    example: "Task removed from bitable only. Please cancel the physical print job on printer panel if needed."
        '400':
          description: 任务ID 格式无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 任务不存在（或不属于当前用户）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权（缺少或无效的飞书 user_access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/manual-duplex-hooks/{token}/continue:
    post:
      tags:
        - 手动双面打印
      summary: 继续手动双面打印（打印第二面）
      description: |
        手动双面打印工作流的第二步。
        用户在打印完第一面后，将纸张翻转放回打印机，调用此接口打印第二面。
      operationId: continueManualDuplexPrint
      parameters:
        - name: token
          in: path
          required: true
          description: 手动双面打印令牌（来自提交任务的响应）
          schema:
            type: string
          example: "abc123def456"
      responses:
        '201':
          description: 第二面打印任务提交成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    description: CUPS 打印任务 ID
                    example: "456"
                  printer:
                    type: string
                    description: 打印机ID
                    example: "color-printer"
                  status:
                    type: string
                    enum: [pending]
                    example: "pending"
                  duplex:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Remaining pages submitted successfully"
        '404':
          description: 令牌不存在或已使用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: CUPS 服务不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权（缺少或无效的飞书 user_access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/manual-duplex-hooks/{token}/cancel:
    post:
      tags:
        - 手动双面打印
      summary: 取消手动双面打印流程
      description: |
        取消手动双面打印工作流。
        如果用户在第一面打印后不想继续打印第二面，可调用此接口取消流程。
      operationId: cancelManualDuplexPrint
      parameters:
        - name: token
          in: path
          required: true
          description: 手动双面打印令牌（来自提交任务的响应）
          schema:
            type: string
          example: "abc123def456"
      responses:
        '200':
          description: 手动双面打印流程成功取消
          content:
            application/json:
              schema:
                type: object
                properties:
                  printer:
                    type: string
                    description: 打印机ID
                    example: "color-printer"
                  duplex:
                    type: boolean
                    example: false
                  status:
                    type: string
                    enum: [cancelled]
                    example: "cancelled"
                  message:
                    type: string
                    example: "Manual duplex flow cancelled; remaining pages were not submitted"
                  cancelled:
                    type: boolean
                    example: true
        '404':
          description: 令牌不存在或已使用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权（缺少或无效的飞书 user_access_token）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    FeishuBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: user_access_token
      description: |
        飞书 OAuth2 网页应用免登方案获取的 user_access_token。
        在请求头中传递：Authorization: Bearer <user_access_token>

    SaneApiKeyAuth:
      type: apiKey
      in: header
      name: X-Sane-Api-Key
      description: |
        scanservjs 代理共享密钥请求头。
        头名默认是 `X-Sane-Api-Key`，可通过 `sane_api.auth_header` 调整。

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: 错误信息
        details:
          type: string
          description: 错误详情（可选）
        printer_id:
          type: string
          description: 相关的打印机ID（可选）
        job_id:
          type: string
          description: 相关的任务ID（可选）
      required:
        - error
      example:
        error: "printer_id is required"

    FeishuUserInfo:
      type: object
      properties:
        open_id:
          type: string
        union_id:
          type: string
        user_id:
          type: string
        name:
          type: string
        en_name:
          type: string
        avatar_url:
          type: string
        tenant_key:
          type: string

    Printer:
      type: object
      properties:
        id:
          type: string
          description: 打印机ID
          example: "color-printer"
        name:
          type: string
          description: 打印机名称
          example: "Office Color Printer"
        description:
          type: string
          description: 打印机描述
          example: "Color laser printer in building A"
        status:
          type: string
          description: 打印机状态
          enum: [idle, processing, stopped]
          example: "idle"
        model:
          type: string
          description: 打印机型号
          example: "HP ColorJet Pro"
        location:
          type: string
          description: 打印机位置
          example: "Building A, 3rd Floor"
        duplex_mode:
          type: string
          description: 双面打印模式
          enum: [auto, manual, off]
          example: "manual"
        reverse:
          type: boolean
          description: 是否启用反向打印
          example: false
        first_pass:
          type: string
          description: 首先打印的页面类型（手动双面打印）
          enum: [even, odd]
          example: "even"
        pad_to_even:
          type: boolean
          description: 是否在奇数页数文档后添加空白页
          example: true
        reverse_first_pass:
          type: boolean
          description: 首先打印是否反向
          example: false
        reverse_second_pass:
          type: boolean
          description: 第二次打印是否反向
          example: false
        rotate_second_pass:
          type: boolean
          description: 第二次打印是否旋转 180 度
          example: false
        note:
          type: string
          description: 打印机备注
          example: "Remember to load special paper for important documents"

    BitablePrintJob:
      type: object
      description: 从飞书多维表返回的打印任务记录
      properties:
        id:
          type: integer
          description: 任务ID（Bitable 自增序号）
          example: 1
        printer_id:
          type: string
          description: 打印机 ID
          example: "sast-printer"
        file_name:
          type: string
          description: 打印的文件名
          example: "document.pdf"
        status:
          type: string
          description: 任务状态（pending, completed, failed 等）
          example: "pending"
        copies:
          type: integer
          description: 打印份数
          example: 1
        duplex:
          type: boolean
          description: 是否启用双面打印
          example: true
        submitted_at:
          type: string
          description: 提交时间，格式为 yyyy-MM-dd HH:mm（例如 2026-04-01 15:39）
          example: "2026-04-01 15:39"
        duplex_hook:
          type: string
          description: 手动双面继续打印的 hook URL（无则为空）
          example: "/manual-duplex-hooks/abc123def456/continue"
        hook_expires_at:
          type: string
          description: hook 过期时间，格式为 yyyy-MM-dd HH:mm（submitted_at + manual_duplex_hook_ttl，仅 duplex_hook 存在时返回）
          example: "2026-04-01 16:09"

    CupsPrintJob:
      type: object
      description: 从 CUPS 查询的单个任务状态
      properties:
        id:
          type: string
          description: CUPS 任务 ID
          example: "123"
        printer_id:
          type: string
          description: 打印机 ID
          example: "sast-printer"
        title:
          type: string
          description: 任务标题
          example: "document.pdf"
        status:
          type: string
          description: 任务状态
          example: "processing"
        reason:
          type: string
          description: CUPS 返回的状态原因
          example: "none"
        raw_state:
          type: integer
          description: IPP 原始状态码
          example: 5
        progress:
          type: integer
          description: 进度（当前实现固定为 0）
          example: 0
        created_at:
          type: string
          description: 任务创建时间（当前实现可能为空）
          example: ""
        updated_at:
          type: string
          description: 任务更新时间（当前实现可能为空）
          example: ""

    SubmitPrintJobResponse:
      type: object
      properties:
        job_id:
          type: string
          description: CUPS 打印任务 ID
          example: "123"
        printer:
          type: string
          description: 打印机ID
          example: "color-printer"
        copies:
          type: integer
          description: 打印份数
          example: 2
        collate:
          type: boolean
          description: 是否排列
          example: true
        status:
          type: string
          enum: [pending]
          example: "pending"
        duplex:
          type: boolean
          description: 是否启用双面打印
          example: false
        note:
          type: string
          description: 打印机备注
          example: "Color printer"
        message:
          type: string
          example: "Print job submitted successfully"
        hook_url:
          type: string
          description: 手动双面打印继续接口 URL（仅在手动双面模式返回）
          example: "/manual-duplex-hooks/abc123def456/continue"
        hook_expires_at:
          type: string
          description: 令牌过期时间，格式为 yyyy-MM-dd HH:mm（仅在手动双面模式返回）
          example: "2026-03-30 22:12"

    SupportedFileTypesResponse:
      type: object
      properties:
        supported_file_types:
          type: array
          description: 支持上传的文件扩展名列表（不带点）
          items:
            type: string
          example: [pdf, doc, docx, ppt, pptx]
        count:
          type: integer
          description: 支持类型数量
          example: 5
        office_conversion_enabled:
          type: boolean
          description: 当前是否启用 Office 转换
          example: true
      required:
        - supported_file_types
        - count
        - office_conversion_enabled

    FeishuExportRequest:
      type: object
      description: 飞书文档导出/预览请求
      properties:
        url:
          type: string
          description: |
            飞书文档或知识库页面的完整 URL。

            支持的格式：
            - https://xxx.feishu.cn/docx/xxx — DocX 文档
            - https://xxx.feishu.cn/doc/xxx — 旧版文档
            - https://xxx.feishu.cn/sheets/xxx — 电子表格
            - https://xxx.feishu.cn/bitable/xxx — 多维表格
            - https://xxx.feishu.cn/mindnotes/xxx — 思维笔记
            - https://xxx.feishu.cn/wiki/xxx — 知识库页面（自动解析节点）
          example: "https://sast.feishu.cn/docx/doxcnXXXXXXXXXXXX"
      required:
        - url

    FeishuPrintJobRequest:
      type: object
      description: 飞书文档导出并打印请求
      properties:
        url:
          type: string
          description: |
            飞书文档或知识库页面的完整 URL（同预览接口）。
          example: "https://sast.feishu.cn/wiki/wikcnXXXXXXXXXXXX"
        printer_id:
          type: string
          description: 目标打印机 ID
          example: "sast-printer"
        copies:
          type: integer
          description: 打印份数，默认 1
          default: 1
          minimum: 1
          example: 2
        duplex:
          type: boolean
          description: 是否启用双面打印（覆盖打印机默认配置）。仅当打印机 duplex_mode 不为 off 时生效
          default: false
          example: true
        collate:
          type: boolean
          description: 份数排列方式。true=1,2,3,1,2,3；false=1,1,2,2,3,3
          default: true
          example: true
        nup:
          type: integer
          description: 每版打印页数（1/2/4）
          enum: [1, 2, 4]
          default: 1
          example: 1
        pages:
          type: string
          description: |
            要打印的页码范围。支持格式：
            - "1,2,3" 打印第 1、2、3 页
            - "1-3" 打印第 1 到 3 页
            - "1-3,5,7-9" 混合范围
            页码从 1 开始。不指定时打印全部。
          example: "1-5,10"
      required:
        - url
        - printer_id
