name: CI/CD with Git Commit Hash Tag

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'cmd/**'
      - 'config/**'
      - 'cups/**'
      - 'office_converter/**'
      - 'proto/**'
      - 'public/**'
      - 'config.example.yaml'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'go.mod'
      - 'Makefile'
      - 'openapi.yaml'
      - 'main.go'
      - '.github/workflows/**'

env:
  SERVICE_NAME: sast-goprint
  REGISTRY_PREFIX: sast
  TAR_FILE_NAME: new_image.tar

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get short Git commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and export to tar
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          # 使用 'latest' 作为临时句柄，并使用 commit hash 作为永久版本标签
          tags: |
            ${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}
          outputs: type=docker,dest=./${{ env.TAR_FILE_NAME }}

      - name: Transfer image to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ${{ env.TAR_FILE_NAME }}
          target: "/data/${{ env.SERVICE_NAME }}/"

      - name: Execute Deployment Script on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # --- 以下脚本在您的 Debian 服务器上执行 ---
            set -e # 任何命令失败则立即退出

            # 定义远程服务器上的变量
            SERVICE_DIR="/data/${{ env.SERVICE_NAME }}"
            IMAGE_NAME="${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}"
            TAR_FILE="${{ env.TAR_FILE_NAME }}"
            NEW_VERSION_TAG="${{ steps.vars.outputs.sha_short }}"

            cd ${SERVICE_DIR}

            echo "🚀 部署开始，版本: ${NEW_VERSION_TAG}"

            echo "📦 从 ${TAR_FILE} 加载新镜像..."
            docker load -i ${TAR_FILE}

            echo "🔄 处理镜像备份与轮换..."
            # 检查是否存在 'current' 镜像 (当前运行版本)
            if docker image inspect "${IMAGE_NAME}:current" >/dev/null 2>&1; then
              # 如果已存在 'backup' 镜像，先删除，保证只留一份备份
              if docker image inspect "${IMAGE_NAME}:backup" >/dev/null 2>&1; then
                echo "  - 发现并删除旧的备份 'backup'..."
                docker rmi "${IMAGE_NAME}:backup"
              fi
              # 将当前的 'current' 镜像重命名为 'backup'
              echo "  - 将 'current' 镜像标记为 'backup'..."
              docker tag "${IMAGE_NAME}:current" "${IMAGE_NAME}:backup"
            else
              echo "  - 未发现 'current' 镜像，跳过备份 (首次部署)"
            fi

            echo "✅ 将新镜像 (${NEW_VERSION_TAG}) 标记为 'current'..."
            docker tag "${IMAGE_NAME}:${NEW_VERSION_TAG}" "${IMAGE_NAME}:current"

            echo "🚀 使用 Docker Compose 启动新服务..."
            docker compose up -d --remove-orphans

            echo "🧹 清理临时文件和镜像..."
            rm ${TAR_FILE}
            docker rmi "${IMAGE_NAME}:latest"
            docker image prune -f

            echo "🎉 部署成功！当前运行版本: ${NEW_VERSION_TAG}"
